# Drop this into `.github/workflows/` of your Open Babel 3.2.0 fork.
#
# Builds a self-contained, statically-linked `obabel` for every platform we ship,
# named to match the SPFIT/SPCAT binaries. The one flag that makes it static is
# `-DBUILD_SHARED=OFF`, which bakes all file formats into the binary instead of
# loading them as runtime `.so`/`.dll` plugins.
#
# 3.2.0 needs far less coaxing than 3.1.1: cmake_minimum_required is 3.12 (so no
# CMake-4 policy hacks) and the legacy std::binary_function / bind1st usages are
# gone (so MSVC needs no source patching). What remains:
#   * maeparser/coordgen default ON and pull in zlib — disabled, not needed for
#     XYZ->SDF / InChIKey.
#   * tools/CMakeLists.txt does find_library(pthread): fine on Linux (musl ships a
#     libpthread.a stub) but NOTFOUND on macOS, so macOS uses -DBUILD_MIXED=ON to
#     link the proper Threads::Threads target instead.
#   * config.h's strcasecmp shim is gated on `#if defined(WIN32)`, which a bare
#     Ninja/cl build doesn't define — supplied via /DWIN32.
#
# Run it from the Actions tab (workflow_dispatch); the binaries appear as artifacts.

name: build-static-obabel

on:
  workflow_dispatch:
  push:
    tags: ["static-*"]   # e.g. push tag `static-3.2.0` to trigger a build

permissions:
  contents: read

jobs:
  # ---- Linux: fully static via musl (Alpine), one arch per job ----
  linux:
    name: ${{ matrix.out }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, alpine_arch: x86_64,  qemu: false, out: obabel_linux_amd64 }
          - { runner: ubuntu-latest, alpine_arch: aarch64, qemu: true,  out: obabel_linux_aarch64 }
    steps:
      - uses: actions/checkout@v4

      # setup-alpine only runs on an x86_64 host; non-x86 arches are emulated via
      # QEMU binfmt, which must be registered first (the aarch64 apk/gcc then run
      # transparently under emulation).
      - if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v3

      # Alpine chroot on the host runner: actions/checkout runs on the host (glibc),
      # the build runs in musl. Pinned to v3.20 for a reproducible toolchain.
      - uses: jirutka/setup-alpine@v1
        with:
          arch: ${{ matrix.alpine_arch }}
          branch: v3.20
          packages: build-base cmake make git eigen-dev

      - name: Configure & build
        shell: alpine.sh {0}
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED=OFF \
            -DWITH_INCHI=ON \
            -DBUILD_GUI=OFF \
            -DRUN_SWIG=OFF \
            -DPYTHON_BINDINGS=OFF \
            -DWITH_MAEPARSER=OFF \
            -DWITH_COORDGEN=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static"
          cmake --build build --target obabel -j"$(nproc)"
          strip build/bin/obabel

      - name: Verify it is static
        shell: alpine.sh {0}
        run: |
          file build/bin/obabel
          ldd build/bin/obabel 2>&1 | grep -q "not a dynamic executable" \
            || { echo "ERROR: obabel is not statically linked"; ldd build/bin/obabel; exit 1; }

      # Non-fatal: a smoke failure must not block the artifact upload.
      - name: Smoke test
        continue-on-error: true
        shell: alpine.sh {0}
        run: |
          printf '3\nwater\nO  0.000  0.000  0.000\nH  0.758  0.000  0.504\nH -0.758  0.000  0.504\n' > water.xyz
          ./build/bin/obabel water.xyz -O water.sdf   # the real use case: XYZ -> SDF
          cat water.sdf
          grep -q 'V2000' water.sdf                    # produced a molfile?
          ./build/bin/obabel water.xyz -oinchikey      # also exercises InChI

      - name: Rename & upload
        run: cp build/bin/obabel "${{ matrix.out }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}
          if-no-files-found: error

  # ---- macOS: no static libc exists; "static" = no plugins, no Homebrew dylibs ----
  macos:
    name: ${{ matrix.out }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-15-intel, arch: x86_64, out: obabel_macos_amd64 }   # Intel
          - { runner: macos-14,       arch: arm64,  out: obabel_macos_arm64 }   # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: brew install eigen   # header-only; maeparser/coordgen are off, so Boost isn't needed

      - name: Configure & build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED=OFF \
            -DWITH_INCHI=ON \
            -DBUILD_GUI=OFF \
            -DRUN_SWIG=OFF \
            -DPYTHON_BINDINGS=OFF \
            -DWITH_MAEPARSER=OFF \
            -DWITH_COORDGEN=OFF \
            -DEIGEN3_INCLUDE_DIR="$(brew --prefix eigen)/include/eigen3" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DBUILD_MIXED=ON   # use Threads::Threads; find_library(pthread) is NOTFOUND on macOS. Clang isn't GNUCXX, so the Linux-only -static-libgcc path is skipped.
          cmake --build build --target obabel -j"$(sysctl -n hw.ncpu)"
          strip build/bin/obabel

      - name: Verify only system libs are linked
        run: |
          otool -L build/bin/obabel
          # Fail if any Homebrew dylib leaked into the binary.
          if otool -L build/bin/obabel | grep -E '/opt/homebrew|/usr/local/'; then
            echo "ERROR: obabel links a Homebrew dylib"; exit 1
          fi

      # Non-fatal: a smoke failure must not block the artifact upload.
      - name: Smoke test
        continue-on-error: true
        run: |
          printf '3\nwater\nO  0.000  0.000  0.000\nH  0.758  0.000  0.504\nH -0.758  0.000  0.504\n' > water.xyz
          ./build/bin/obabel water.xyz -O water.sdf   # the real use case: XYZ -> SDF
          cat water.sdf
          grep -q 'V2000' water.sdf                    # produced a molfile?
          ./build/bin/obabel water.xyz -oinchikey      # also exercises InChI

      - name: Rename & upload
        run: cp build/bin/obabel "${{ matrix.out }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}
          if-no-files-found: error

  # ---- Windows: 64-bit MSVC, static CRT, Eigen from vcpkg ----
  windows:
    name: obabel-x86_64-pc-windows-msvc.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Eigen (vcpkg)
        run: vcpkg install eigen3:x64-windows
        shell: pwsh

      # Don't pin the VS generator — the runner image ships VS 18, so the
      # "Visual Studio 17 2022" generator finds nothing. Set up the x64 MSVC
      # environment (vswhere -latest) and build with Ninja, which is generator-
      # version-agnostic and preinstalled on the runner.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure & build
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED=OFF `
            -DWITH_INCHI=ON `
            -DBUILD_GUI=OFF `
            -DRUN_SWIG=OFF `
            -DPYTHON_BINDINGS=OFF `
            -DWITH_MAEPARSER=OFF `
            -DWITH_COORDGEN=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DCMAKE_C_FLAGS="/DWIN32" `
            -DCMAKE_CXX_FLAGS="/DWIN32" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --target obabel

      # Non-fatal: a smoke failure must not block the artifact upload.
      - name: Smoke test
        continue-on-error: true
        shell: pwsh
        run: |
          Set-Content -Encoding ascii water.xyz @(
            '3', 'water',
            'O  0.000  0.000  0.000',
            'H  0.758  0.000  0.504',
            'H -0.758  0.000  0.504')
          build\bin\obabel.exe water.xyz -O water.sdf   # the real use case: XYZ -> SDF
          Get-Content water.sdf
          if (-not (Select-String water.sdf -Pattern 'V2000' -Quiet)) { throw 'xyz->sdf produced no molfile' }
          build\bin\obabel.exe water.xyz -oinchikey      # also exercises InChI

      - name: Rename & upload
        shell: pwsh
        run: copy build\bin\obabel.exe obabel-x86_64-pc-windows-msvc.exe
      - uses: actions/upload-artifact@v4
        with:
          name: obabel-x86_64-pc-windows-msvc.exe
          path: obabel-x86_64-pc-windows-msvc.exe
          if-no-files-found: error
